name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Build x86_64 (musl)
        run: cargo build --target x86_64-unknown-linux-musl --release --locked
      - name: Build aarch64 (musl) with cross
        run: |
          cargo install cross
          cross build --target aarch64-unknown-linux-musl --release --locked
      - name: Install packaging tools
        run: |
          cargo install cargo-deb
          cargo install cargo-generate-rpm
      - name: Build .deb packages (x86_64, aarch64)
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          VERSION_SHORT="${VERSION%.*}"
          mkdir -p release
          for target in x86_64-unknown-linux-musl aarch64-unknown-linux-musl; do
            STRIP_FLAG=""
            [ "$target" = "aarch64-unknown-linux-musl" ] && STRIP_FLAG="--no-strip"
            cargo deb --no-build --target "$target" --deb-version "$VERSION_SHORT" $STRIP_FLAG -p peek-process && cp target/debian/*.deb release/
            cargo deb --no-build --target "$target" --deb-version "$VERSION_SHORT" $STRIP_FLAG -p peekd && cp target/debian/*.deb release/
          done
      - name: Build .rpm packages (x86_64)
        run: |
          mkdir -p crates/peek-cli/target/release crates/peekd/target/release
          cp target/x86_64-unknown-linux-musl/release/peek crates/peek-cli/target/release/peek
          cp target/x86_64-unknown-linux-musl/release/peekd crates/peekd/target/release/peekd
          (cd crates/peek-cli && cargo generate-rpm)
          (cd crates/peekd && cargo generate-rpm)
          cp crates/peek-cli/target/generate-rpm/*.rpm release/
          cp crates/peekd/target/generate-rpm/*.rpm release/
      - name: Prepare release assets
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          VERSION_LABEL="v${VERSION%.*}"
          mkdir -p release
          cp target/x86_64-unknown-linux-musl/release/peek  release/peek-${VERSION_LABEL}-x86_64-linux-musl
          cp target/x86_64-unknown-linux-musl/release/peekd release/peekd-${VERSION_LABEL}-x86_64-linux-musl
          cp target/aarch64-unknown-linux-musl/release/peek  release/peek-${VERSION_LABEL}-aarch64-linux-musl
          cp target/aarch64-unknown-linux-musl/release/peekd release/peekd-${VERSION_LABEL}-aarch64-linux-musl
          (cd release && sha256sum * > sha256sums.txt)
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true

  # Publishes workspace crates to crates.io in dependency order.
  # Requires repo secret: CARGO_REGISTRY_TOKEN (crates.io API token).
  # Waits after each publish so the crates.io index can update before dependents are published.
  publish-crates-io:
    runs-on: ubuntu-latest
    needs: release
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish to crates.io
        run: |
          set -euo pipefail

          MAX_ATTEMPTS=8
          POLL_INTERVAL=20
          INDEX_SETTLE=45

          publish_one() {
            local crate="$1"
            local settle="${2:-$INDEX_SETTLE}"  # pass 0 for the last crate
            local attempt

            for attempt in $(seq 1 "$MAX_ATTEMPTS"); do
              out=$(cargo publish -p "$crate" 2>&1) && published=true || published=false

              if echo "$out" | grep -q "already exists"; then
                echo "[$crate] Already published — skipping."
                return 0
              fi

              if $published || echo "$out" | grep -q "Uploading\|Published"; then
                if [ "$settle" -gt 0 ]; then
                  echo "[$crate] Published. Waiting ${settle}s for index to settle..."
                  sleep "$settle"
                else
                  echo "[$crate] Published."
                fi
                return 0
              fi

              echo "[$crate] Attempt $attempt/$MAX_ATTEMPTS failed — retrying in ${POLL_INTERVAL}s:"
              echo "$out" | tail -10
              sleep "$POLL_INTERVAL"
            done

            echo "[$crate] All $MAX_ATTEMPTS attempts exhausted. Aborting."
            return 1
          }

          # Tier 1 — true leaf crates (no internal deps) — publish in parallel
          publish_one peek-proc-reader  &
          publish_one kernel-explainer  &
          publish_one network-inspector &
          publish_one resource-sampler  &
          wait

          # Tier 2 — signal-engine depends on network-inspector
          publish_one signal-engine

          # Tier 3 — peek-core depends on all tier-1 + tier-2 crates
          publish_one peek-core

          # Tier 4 — export-engine and peekd both depend only on peek-core
          publish_one export-engine &
          publish_one peekd         &
          wait

          # Tier 5 — peek-process depends on export-engine, peek-core, etc.
          publish_one peek-process 0

          echo "All crates published successfully."
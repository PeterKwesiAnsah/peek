name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl, aarch64-unknown-linux-musl
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Build x86_64
        run: cargo build --target x86_64-unknown-linux-musl --release
      - name: Build aarch64
        run: cargo build --target aarch64-unknown-linux-musl --release
      - name: Prepare release assets
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          mkdir -p release
          cp target/x86_64-unknown-linux-musl/release/peek  release/peek-${TAG}-x86_64-unknown-linux-musl
          cp target/x86_64-unknown-linux-musl/release/peekd release/peekd-${TAG}-x86_64-unknown-linux-musl
          cp target/aarch64-unknown-linux-musl/release/peek  release/peek-${TAG}-aarch64-unknown-linux-musl
          cp target/aarch64-unknown-linux-musl/release/peekd release/peekd-${TAG}-aarch64-unknown-linux-musl
      - name: Publish to crates.io
        continue-on-error: true
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -n "$CARGO_REGISTRY_TOKEN" ]; then
            cargo publish -p peek-cli --token "$CARGO_REGISTRY_TOKEN" --allow-dirty
          else
            echo "CARGO_REGISTRY_TOKEN not set; skipping crates.io publish"
          fi
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true


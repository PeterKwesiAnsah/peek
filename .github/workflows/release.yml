name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl, aarch64-unknown-linux-musl
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Build x86_64
        run: cargo build --target x86_64-unknown-linux-musl --release
      - name: Build aarch64
        run: cargo build --target aarch64-unknown-linux-musl --release
      - name: Install packaging tools
        run: |
          cargo install cargo-deb
          cargo install cargo-generate-rpm
      - name: Build .deb packages (x86_64, aarch64)
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          mkdir -p release
          for target in x86_64-unknown-linux-musl aarch64-unknown-linux-musl; do
            cargo deb --no-build --target "$target" --deb-version "$VERSION" -p peek-cli && cp target/debian/*.deb release/
            cargo deb --no-build --target "$target" --deb-version "$VERSION" -p peekd && cp target/debian/*.deb release/
          done
      - name: Build .rpm packages (x86_64)
        run: |
          cp target/x86_64-unknown-linux-musl/release/peek target/release/peek
          cp target/x86_64-unknown-linux-musl/release/peekd target/release/peekd
          cargo generate-rpm -p peek-cli
          cargo generate-rpm -p peekd
          cp target/generate-rpm/*.rpm release/
      - name: Prepare release assets
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          mkdir -p release
          cp target/x86_64-unknown-linux-musl/release/peek  release/peek-${TAG}-x86_64-unknown-linux-musl
          cp target/x86_64-unknown-linux-musl/release/peekd release/peekd-${TAG}-x86_64-unknown-linux-musl
          cp target/aarch64-unknown-linux-musl/release/peek  release/peek-${TAG}-aarch64-unknown-linux-musl
          cp target/aarch64-unknown-linux-musl/release/peekd release/peekd-${TAG}-aarch64-unknown-linux-musl
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true

